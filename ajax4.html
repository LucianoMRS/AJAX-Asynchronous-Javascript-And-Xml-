<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX 4</title>
</head>
<body>
    <button id="btnCarregar">Carregar Dados (Async/Await)</button>
    <div id="resultado"></div>

    <script>
        // A palavra 'async' avisa ao JS que essa função tem ações assíncronas
        async function carregarDados() {
            try {
                // O 'await' pausa a execução da função até o fetch terminar
                const response = await fetch('https://api.exemplo.com/dados');
                
                if (!response.ok) {
                    throw new Error('Erro na requisição: ' + response.status);
                }
                
                const dados = await response.text();
                document.getElementById('resultado').innerHTML = dados;
                
            } catch (erro) {
                // Erros são capturados facilmente com try/catch tradicional
                console.error('Falha ao buscar os dados:', erro);
            }
        }

        document.getElementById('btnCarregar').addEventListener('click', carregarDados);
    </script>
</body>
</html>
